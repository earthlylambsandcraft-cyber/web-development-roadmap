<!DOCTYPE html>
<html>
    <head>
        <title>Join EarthlyLamb Mania</title>
    </head>
<body>
    <form>
        <h1>Sign up</h1>
        
        <label for="first name">
            First Name
        </label>
        
        <br><br>
        
        <input
            id="firstname"
            type="text"
            placeholder="Enter your first name"
            required>
         
            <br><br>
        
        <label for="lastname">
            Last Name
        </label>

        <br><br>

        <input
            id="lastname"
            type="text"
            placeholder="Enter your last name"
            required>
        
            <br><br>

        <label for="Mobile Number">
            Mobile Number
        </label>

        <br><br>

        <input
            id="mobileNumber"
            type="number"
            placeholder="Enter your mobile number(optional)">

            <br><br>

        <label for="password">
            Password
        </label>
        
        <br><br>

        <input
            id="password"
            type="password"
            placeholder="Enter your password"
            required>
        <br><br>

        <button>Sign up</button>
            

         
    </form>
</body>    
</html>
