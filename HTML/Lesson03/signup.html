<!DOCTYPE html>
<html>
    <head>
        <title>Join EarthlyLamb Mania</title>
    </head>
<body>
    <a href="index.html">
             Back to login 
        </a>
    <form>

        <h1>Sign up</h1>
        
        <label for="firstname">
            First Name
        </label>
        
        <br><br>
        
        <input
            id="firstname"
            type="text"
            placeholder="Enter your first name"
            required>
         
            <br><br>
        
        <label for="lastname">
            Last Name
        </label>

        <br><br>

        <input
            id="lastname"
            type="text"
            placeholder="Enter your last name"
            required>
        
            <br><br>

        <label for="MobileNumber">
            Mobile Number
        </label>

        <br><br>

        <input
            id="mobileNumber"
            type="tel"
            placeholder="+63-xxx-xxx-xxxx (optional)">

            <br><br>

        <label for="password">
            Password
        </label>
        
        <br><br>

        <input
            id="password"
            type="password"
            placeholder="Enter your password"
            required>
        <br><br>

        <button>Sign up</button>
            

         
    </form>
</body>    
</html>
